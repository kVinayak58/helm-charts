name: app
replicaCount: 1

image:
  repository: ""
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  paths: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: []
envFrom: []

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15

readinessProbe:
  path: /health
  port: http
  initialDelaySeconds: 5

serviceAccount:
  create: false
  name: ""

namespace: default
